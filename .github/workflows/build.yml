name: Build & Test Smart Parking App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: cd smart_parking_app && flutter pub get

      - name: Static analysis
        run: cd smart_parking_app && flutter analyze

      - name: Run unit tests
        run: cd smart_parking_app && flutter test

      - name: Build release APK
        run: cd smart_parking_app && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: smart-parking-release-apk
          path: smart_parking_app/build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: smart-parking-debug-apk
          path: smart_parking_app/build/app/outputs/flutter-apk/app-debug.apk
